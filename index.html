<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <link rel="icon" href="tic-tac-toe.ico" sizes="any">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section class="game" aria-label="Two player tic-tac-toe game">
      <header>
        <img class="logo" src="estime_logo_RGB.png" alt="Estime">
        <div class="title-row" id="titleRow">
          <img class="ai-watch-icon" src="ia-watching-eye.svg" alt="" aria-hidden="true">
          <h1>Tic-Tac-Toe</h1>
          <img class="ai-watch-icon" src="ia-watching-eye.svg" alt="" aria-hidden="true">
        </div>
        <div class="status" id="status" role="status" aria-live="polite">X commence</div>
      </header>

      <div class="board" id="board" aria-label="Tic-tac-toe board">
        <button class="cell" type="button" aria-label="Empty cell 1"></button>
        <button class="cell" type="button" aria-label="Empty cell 2"></button>
        <button class="cell" type="button" aria-label="Empty cell 3"></button>
        <button class="cell" type="button" aria-label="Empty cell 4"></button>
        <button class="cell" type="button" aria-label="Empty cell 5"></button>
        <button class="cell" type="button" aria-label="Empty cell 6"></button>
        <button class="cell" type="button" aria-label="Empty cell 7"></button>
        <button class="cell" type="button" aria-label="Empty cell 8"></button>
        <button class="cell" type="button" aria-label="Empty cell 9"></button>
      </div>

      <div class="actions">
        <button class="reset" id="reset" type="button">Recommencer la partie</button>
      </div>

      <div class="mode-control">
        <label for="mode">Mode</label>
        <select id="mode" name="mode">
          <option value="manual">Standard</option>
          <option value="ai-training">Entraînement d'IA</option>
          <option value="vs-ai">Jouer contre l'IA</option>
        </select>
      </div>
    </section>
  </main>

  <script src="main.js" defer></script>
</body>
</html>
